<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TRACS — Bad Gateway</title>
<script>
(function(){
  var KEY = 'tracs_theme_preference';
  var pref = localStorage.getItem(KEY);
  function timeTheme(date) {
    var hour = (date || new Date()).getHours();
    return hour >= 6 && hour < 18 ? 'light' : 'dark';
  }
  function browserTheme() {
    return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }
  var theme = pref === 'light' || pref === 'dark'
    ? pref
    : (pref === 'auto' || pref === 'system' ? timeTheme() : browserTheme());
  document.documentElement.setAttribute('data-theme', theme || 'light');
})();
</script>
<style>
  :root {
    --bg: #eef1f5;
    --tx1: #242a33;
    --tx2: #535d6b;
    --tx3: #7f8896;
    --blue: #2563eb;
    --blue-lt: rgba(37,99,235,.07);
    --bd1: #dde2e9;
    --shadow-lg: 0 18px 44px rgba(17,24,39,.12), 0 3px 10px rgba(17,24,39,.08);
  }
  [data-theme="dark"] {
    --bg: #0d1117;
    --tx1: #edf2f8;
    --tx2: #b3bdca;
    --tx3: #7d8899;
    --blue: #3b82f6;
    --bd1: #232a35;
    --shadow-lg: 0 24px 62px rgba(0,0,0,.52);
  }
  html, body { min-height: 100%; overflow: auto; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--tx1);
    font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif;
  }
  .not-found-grid {
    position: fixed;
    inset: 0;
    opacity: .35;
    background-image: linear-gradient(var(--bd1) 1px, transparent 1px), linear-gradient(90deg, var(--bd1) 1px, transparent 1px);
    background-size: 34px 34px;
    -webkit-mask-image: radial-gradient(ellipse at center, black 20%, transparent 72%);
    mask-image: radial-gradient(ellipse at center, black 20%, transparent 72%);
    pointer-events: none;
  }
  [data-theme="dark"] .not-found-grid { opacity: .38; }
  .not-found-page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    min-height: 100dvh;
    display: grid;
    place-items: center;
    padding: clamp(24px, 6vh, 56px) clamp(22px, 5vw, 80px);
    box-sizing: border-box;
  }
  .not-found-shell {
    width: fit-content;
    max-width: 100%;
    display: grid;
    grid-template-columns: 260px max-content;
    gap: clamp(22px, 2.8vw, 36px);
    align-items: center;
    justify-content: center;
  }
  .not-found-copy { width: max-content; max-width: 100%; }
  .not-found-kicker {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 18px;
    color: var(--blue);
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
  }
  .not-found-kicker::before {
    content: "";
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--blue);
    box-shadow: 0 0 0 5px var(--blue-lt);
  }
  .not-found-title {
    margin: 0;
    font-size: clamp(32px, 4.2vw, 48px);
    line-height: 1.02;
    white-space: nowrap;
  }
  .not-found-subtitle {
    margin: 18px 0 0;
    color: var(--tx2);
    font-size: 16px;
    font-weight: 600;
    line-height: 1.45;
  }
  .not-found-desc {
    max-width: 520px;
    margin: 12px 0 0;
    color: var(--tx3);
    font-size: 14px;
    line-height: 1.65;
  }
  .not-found-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 28px; }
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    min-height: 30px;
    padding: 5px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    border: 1px solid transparent;
    cursor: pointer;
    text-decoration: none;
    transition: background .18s ease, border-color .18s ease, transform .18s ease, box-shadow .18s ease;
  }
  .btn-primary {
    background: linear-gradient(180deg, rgba(59,130,246,.12) 0%, rgba(59,130,246,.08) 100%);
    color: #2563eb;
    border-color: rgba(59,130,246,.22);
    box-shadow: 0 1px 2px rgba(37,99,235,.08);
  }
  [data-theme="dark"] .btn-primary { color: #7db3ff; }
  .btn-primary:hover {
    background: linear-gradient(180deg, rgba(59,130,246,.18) 0%, rgba(59,130,246,.13) 100%);
    border-color: rgba(59,130,246,.35);
    box-shadow: 0 4px 12px rgba(37,99,235,.12);
    transform: translateY(-1px);
  }
  .btn-ghost { background: transparent; color: var(--tx3); border-color: var(--bd1); }
  .btn-ghost:hover { background: rgba(127,136,150,.08); color: var(--tx2); }
  .not-found-mascot { width: 100%; aspect-ratio: 1; border-radius: 50%; }
  .not-found-mascot img { width: 100%; height: 100%; display: block; object-fit: cover; border-radius: 50%; box-shadow: var(--shadow-lg); }
  @media (max-width: 1120px) {
    .not-found-shell { grid-template-columns: 1fr; gap: 28px; }
    .not-found-mascot { width: min(200px, 54vw); justify-self: center; }
  }
  @media (max-width: 760px) {
    .not-found-page { place-items: center; overflow-x: hidden; padding: 24px 20px; }
    .not-found-shell, .not-found-copy { min-width: 0; width: 100%; }
    .not-found-shell { max-width: 520px; }
    .not-found-title { overflow-wrap: anywhere; white-space: normal; }
    .not-found-actions { width: 100%; }
    .not-found-actions .btn { flex: 1 1 180px; justify-content: center; }
  }
</style>
</head>
<body>
<div class="not-found-grid" aria-hidden="true"></div>
<main class="not-found-page">
  <section class="not-found-shell" aria-labelledby="notFoundTitle">
    <div class="not-found-mascot" aria-hidden="true">
      <img src="/assets/images/dobby-404.png" alt="" loading="eager" decoding="async">
    </div>
    <div class="not-found-copy">
      <div class="not-found-kicker">TRACS Bad Gateway</div>
      <h1 class="not-found-title" id="notFoundTitle">502 — Bad Gateway</h1>
      <p class="not-found-subtitle">Dobby cannot reach the backend right now.</p>
      <p class="not-found-desc">The server received an invalid response while acting as a gateway. This is usually temporary — please try again in a moment.</p>
      <div class="not-found-actions">
        <button class="btn btn-primary" type="button" onclick="location.reload()">Retry</button>
        <a class="btn btn-ghost" href="/">Home</a>
      </div>
    </div>
  </section>
</main>
</body>
</html>
